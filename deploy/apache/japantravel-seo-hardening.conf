<IfModule mod_autoindex.c>
    <Directory "/var/www/html/wp-content/uploads">
        Options -Indexes
    </Directory>
</IfModule>

<IfModule mod_headers.c>
    <LocationMatch "^/wp-includes/.*\.(js|css)$">
        Header always set X-Robots-Tag "noindex, follow, nosnippet"
    </LocationMatch>
</IfModule>
